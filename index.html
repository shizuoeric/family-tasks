<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相亲相爱的一家人</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --border: #e1e4e8;
    --primary: #5c6bc0;
    --primary-light: #e8eaf6;
    --text: #24292e;
    --muted: #6a737d;
    --danger: #e53935;
    --success: #43a047;
    --warning: #fb8c00;
    --todo-bg: #f3f4f6;
    --progress-bg: #fff8e1;
    --done-bg: #e8f5e9;
    --radius: 8px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
  .content { flex: 1; overflow-y: auto; padding: 24px; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 16px; font-weight: 700; color: var(--primary); }
  .sidebar-header p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .sidebar-section { padding: 8px; }
  .sidebar-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 8px 4px; }
  .project-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.1s; }
  .project-item:hover { background: var(--bg); }
  .project-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
  .project-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .project-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .project-count { font-size: 11px; color: var(--muted); background: var(--bg); border-radius: 10px; padding: 1px 6px; }
  .project-item.active .project-count { background: white; }
  .add-project-btn { display: flex; align-items: center; gap: 6px; padding: 7px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all 0.1s; border: none; background: none; width: 100%; }
  .add-project-btn:hover { background: var(--bg); color: var(--text); }
  .topbar h2 { font-size: 16px; font-weight: 600; flex: 1; }
  .view-tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 6px; padding: 3px; }
  .view-tab { padding: 5px 12px; border-radius: 4px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--muted); transition: all 0.1s; }
  .view-tab.active { background: var(--surface); color: var(--text); font-weight: 600; box-shadow: var(--shadow); }
  .btn { padding: 7px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; font-weight: 500; transition: all 0.1s; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: #4a59b0; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { background: var(--bg); }
  .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border-radius: var(--radius); padding: 14px 18px; border: 1px solid var(--border); flex: 1; }
  .stat-card .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .stat-card .value { font-size: 24px; font-weight: 700; }
  .stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.3s; }
  .kanban { display: flex; gap: 16px; align-items: flex-start; }
  .kanban-col { background: var(--bg); border-radius: var(--radius); padding: 12px; width: 280px; flex-shrink: 0; }
  .kanban-col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .kanban-col-title { font-size: 13px; font-weight: 600; }
  .kanban-col-count { font-size: 11px; color: var(--muted); background: var(--surface); border-radius: 10px; padding: 1px 7px; }
  .task-card { background: var(--surface); border-radius: 6px; padding: 12px; margin-bottom: 8px; border: 1px solid var(--border); cursor: grab; transition: box-shadow 0.1s; }
  .task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
  .task-card.dragging { opacity: 0.5; }
  .task-card .task-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .task-card .task-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
  .priority-high { background: #fde8e8; color: #c62828; }
  .priority-med { background: #fff3e0; color: #e65100; }
  .priority-low { background: #e8f5e9; color: #2e7d32; }
  .due-date { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 3px; }
  .due-date.overdue { color: var(--danger); }
  .assignee { font-size: 11px; color: var(--muted); }
  .task-actions { display: flex; gap: 4px; margin-left: auto; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 3px 5px; border-radius: 4px; font-size: 13px; }
  .icon-btn:hover { background: #eee; }
  .drop-zone { min-height: 60px; border: 2px dashed transparent; border-radius: 6px; transition: all 0.15s; }
  .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-light); }
  .add-task-inline { width: 100%; background: none; border: 1px dashed var(--border); border-radius: 6px; padding: 8px; font-size: 12px; color: var(--muted); cursor: pointer; text-align: left; transition: all 0.1s; }
  .add-task-inline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .asana-wrap { background: var(--surface); }
  .asana-col-header { display: flex; align-items: center; border-bottom: 1px solid #e8e8e8; background: #fafafa; position: sticky; top: 0; z-index: 2; }
  .asana-col-header .col-task { flex: 1; min-width: 0; padding: 8px 12px 8px 44px; font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.4px; border-right: 1px solid #e8e8e8; }
  .asana-col-header .col-field { width: 140px; flex-shrink: 0; padding: 8px 12px; font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.4px; border-right: 1px solid #e8e8e8; }
  .asana-col-header .col-field:last-child { border-right: none; }
  .asana-section { margin-bottom: 0; }
  .asana-section-header { display: flex; align-items: center; gap: 6px; padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #e8e8e8; background: #fff; user-select: none; }
  .asana-section-header:hover { background: #f5f5f5; }
  .section-arrow { font-size: 10px; color: #888; transition: transform 0.15s; width: 14px; }
  .section-arrow.collapsed { transform: rotate(-90deg); }
  .section-name { font-size: 13px; font-weight: 600; color: #1a1a1a; }
  .section-badge { font-size: 11px; color: #888; background: #f0f0f0; border-radius: 8px; padding: 1px 7px; }
  .section-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .asana-row { display: flex; align-items: center; border-bottom: 1px solid #f0f0f0; min-height: 38px; background: #fff; transition: background 0.08s; }
  .asana-row:hover { background: #f7f8f9; }
  .asana-row:hover .row-actions { opacity: 1; }
  .asana-row:hover .task-check:not(.checked):not(.in-progress) { border-color: #43a047; }
  .row-check { width: 44px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .task-check { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #d0d0d0; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; background: #fff; }
  .task-check:hover { border-color: var(--success); }
  .task-check.checked { border-color: var(--success); background: var(--success); }
  .task-check.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; line-height: 1; }
  .task-check.in-progress { border-color: var(--warning); border-style: solid; background: linear-gradient(to right, var(--warning) 50%, #fff 50%); }
  .row-title { flex: 1; min-width: 0; padding: 0 12px 0 0; border-right: 1px solid #e8e8e8; display: flex; align-items: center; gap: 6px; }
  .title-text { font-size: 13px; color: #1a1a1a; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 9px 0; }
  .title-text:hover { color: var(--primary); }
  .title-text.done-text { text-decoration: line-through; color: #aaa; }
  .row-field { width: 140px; flex-shrink: 0; padding: 0 12px; border-right: 1px solid #e8e8e8; font-size: 13px; color: #444; display: flex; align-items: center; min-height: 38px; overflow: hidden; }
  .row-field:last-child { border-right: none; }
  .row-field.muted { color: #aaa; }
  .avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; flex-shrink: 0; }
  .avatar + .avatar { margin-left: -6px; }
  .row-actions { opacity: 0; display: flex; gap: 2px; margin-left: auto; padding-right: 8px; }
  .add-row-btn { display: flex; align-items: center; gap: 8px; padding: 8px 12px 8px 44px; font-size: 13px; color: #aaa; cursor: pointer; border: none; background: none; width: 100%; text-align: left; border-bottom: 1px solid #e8e8e8; transition: color 0.1s; }
  .add-row-btn:hover { color: var(--primary); background: #f0f4ff; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-todo { background: #9e9e9e; }
  .status-progress { background: var(--warning); }
  .status-done { background: var(--success); }
  .task-list-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: var(--surface); border-radius: 12px; width: 480px; max-width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 15px; font-weight: 600; }
  .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--muted); }
  .form-group input, .form-group select, .form-group textarea { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; color: var(--text); outline: none; transition: border 0.1s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .hidden { display: none !important; }
  .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
  .home-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; }
  .home-card h3 { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .upcoming-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .upcoming-item:last-child { border-bottom: none; }
  .upcoming-item .proj-tag { font-size: 10px; padding: 1px 6px; border-radius: 10px; color: white; }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>❤️ 相亲相爱的一家人</h1>
      <p>家庭项目管理</p>
    </div>
    <div class="sidebar-section">
      <div class="project-item" data-id="home" onclick="selectProject('home')">
        <span>🏠</span>
        <span class="project-name">总览</span>
      </div>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto;">
      <div class="sidebar-label">项目</div>
      <div id="project-list"></div>
      <button class="add-project-btn" onclick="openProjectModal()"><span>＋</span> 新建项目</button>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <h2 id="page-title">总览</h2>
      <div class="view-tabs" id="view-tabs" style="display:none;">
        <button class="view-tab" onclick="switchView('list')">📋 表格</button>
        <button class="view-tab" onclick="switchView('kanban')">🗂 看板</button>
      </div>
      <button class="btn btn-primary" id="add-task-btn" style="display:none;" onclick="openTaskModal()">＋ 新建任务</button>
      <span id="sync-status" style="font-size:12px;color:#43a047;opacity:0;transition:opacity 0.5s;"></span>
      <button class="btn btn-ghost" onclick="joinRoom()" style="font-size:12px;padding:5px 10px;">🔗 加入房间</button>
    </div>
    <div class="room-banner" style="display:none;align-items:center;gap:10px;padding:8px 20px;background:#e8f5e9;border-bottom:1px solid #c8e6c9;font-size:13px;">
      <span>🏠 你的房间码：</span>
      <code id="room-code-display" style="background:#fff;padding:2px 10px;border-radius:4px;font-size:13px;border:1px solid #c8e6c9;letter-spacing:1px;"></code>
      <button class="btn btn-ghost" onclick="copyRoomCode()" style="font-size:12px;padding:4px 10px;">复制</button>
      <span style="color:#666;font-size:12px;">← 把这个码发给家人，他们点「加入房间」输入即可</span>
      <button onclick="this.closest('.room-banner').style.display='none'" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#999;font-size:16px;">✕</button>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<div class="modal-overlay hidden" id="project-modal">
  <div class="modal">
    <div class="modal-header"><h3>新建项目</h3><button class="icon-btn" onclick="closeModal('project-modal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>项目名称</label><input type="text" id="proj-name" placeholder="例如：家庭旅行"></div>
      <div class="form-group">
        <label>颜色</label>
        <div style="display:flex;gap:8px;margin-top:4px;" id="color-picker">
          <div onclick="selectColor(this,'#5c6bc0')" style="width:24px;height:24px;border-radius:50%;background:#5c6bc0;cursor:pointer;border:2px solid #5c6bc0;"></div>
          <div onclick="selectColor(this,'#26a69a')" style="width:24px;height:24px;border-radius:50%;background:#26a69a;cursor:pointer;border:2px solid transparent;"></div>
          <div onclick="selectColor(this,'#ef5350')" style="width:24px;height:24px;border-radius:50%;background:#ef5350;cursor:pointer;border:2px solid transparent;"></div>
          <div onclick="selectColor(this,'#ab47bc')" style="width:24px;height:24px;border-radius:50%;background:#ab47bc;cursor:pointer;border:2px solid transparent;"></div>
          <div onclick="selectColor(this,'#ff7043')" style="width:24px;height:24px;border-radius:50%;background:#ff7043;cursor:pointer;border:2px solid transparent;"></div>
          <div onclick="selectColor(this,'#66bb6a')" style="width:24px;height:24px;border-radius:50%;background:#66bb6a;cursor:pointer;border:2px solid transparent;"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('project-modal')">取消</button><button class="btn btn-primary" onclick="createProject()">创建</button></div>
  </div>
</div>

<div class="modal-overlay hidden" id="task-modal">
  <div class="modal">
    <div class="modal-header"><h3 id="task-modal-title">新建任务</h3><button class="icon-btn" onclick="closeModal('task-modal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>任务标题 *</label><input type="text" id="task-title" placeholder="输入任务内容..."></div>
      <div class="form-row">
        <div class="form-group"><label>状态</label><select id="task-status"><option value="todo">待处理</option><option value="progress">进行中</option><option value="done">已完成</option></select></div>
        <div class="form-group"><label>优先级</label><select id="task-priority"><option value="low">Low</option><option value="med">Med</option><option value="high">High</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Assignee</label><input type="text" id="task-owner" placeholder="例如：Shi, Sunny"></div>
        <div class="form-group"><label>Customer</label><input type="text" id="task-customer" placeholder="例如：Sandy"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>截止日期</label><input type="date" id="task-due"></div>
        <div class="form-group"></div>
      </div>
      <div class="form-group"><label>备注</label><textarea id="task-note" rows="2" placeholder="备注信息..."></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('task-modal')">取消</button><button class="btn btn-primary" onclick="saveTask()">保存</button></div>
  </div>
</div>

<script>
let state = { projects: [], tasks: [], currentProject: 'home', currentView: 'list', editingTaskId: null, selectedColor: '#5c6bc0', dragTaskId: null };

const API_KEY = '$2a$10$GG0K5c8/QbDkcFKQChTSxu6NkRdbAPUeMqvAKXw2KPuoW40BN1Vrm';
let binId = localStorage.getItem('pm_bin_id') || null;
let saveTimer = null;

function save() {
  try { localStorage.setItem('pm_state_v2', JSON.stringify({ projects: state.projects, tasks: state.tasks })); } catch(e) {}
  clearTimeout(saveTimer);
  saveTimer = setTimeout(cloudSave, 800);
}
async function cloudSave() {
  const data = { projects: state.projects, tasks: state.tasks };
  try {
    if (!binId) {
      const res = await fetch('https://api.jsonbin.io/v3/b', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY, 'X-Bin-Name': 'family-tasks', 'X-Bin-Private': 'true' }, body: JSON.stringify(data) });
      const json = await res.json();
      binId = json.metadata.id;
      localStorage.setItem('pm_bin_id', binId);
      showRoomCode();
    } else {
      await fetch(`https://api.jsonbin.io/v3/b/${binId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY }, body: JSON.stringify(data) });
    }
    setSyncStatus('✓ 已同步');
  } catch(e) { setSyncStatus('⚠ 同步失败'); }
}
async function cloudLoad(id) {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, { headers: { 'X-Master-Key': API_KEY } });
    const json = await res.json();
    return json.record;
  } catch(e) { return null; }
}
function setSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; el.style.opacity = '1'; setTimeout(() => el.style.opacity = '0', 2000); }
}
function showRoomCode() {
  const el = document.getElementById('room-code-display');
  if (el && binId) { el.textContent = binId; el.closest('.room-banner').style.display = 'flex'; }
}
function copyRoomCode() {
  if (binId) { navigator.clipboard.writeText(binId); setSyncStatus('✓ 已复制房间码'); }
}
async function joinRoom() {
  const code = prompt('输入房间码（Room Code）：');
  if (!code || !code.trim()) return;
  const id = code.trim();
  const data = await cloudLoad(id);
  if (!data) { alert('找不到该房间码，请检查后重试'); return; }
  binId = id;
  localStorage.setItem('pm_bin_id', id);
  state.projects = data.projects || [];
  state.tasks = data.tasks || [];
  localStorage.setItem('pm_state_v2', JSON.stringify({ projects: state.projects, tasks: state.tasks }));
  if (state.projects.length > 0) state.currentProject = state.projects[0].id;
  setSyncStatus('✓ 已加入房间');
  render();
}
function load() {
  try { const s = localStorage.getItem('pm_state_v2'); if (s) { const p = JSON.parse(s); state.projects = p.projects || []; state.tasks = p.tasks || []; } } catch(e) {}
}
function initSample() {
  const p1 = uid();
  state.projects = [{ id: p1, name: 'Sandy Visit Seattle', color: '#5c6bc0' }];
  state.tasks = [
    { id: uid(), projectId: p1, title: 'Pick up Sandy', status: 'todo', priority: 'high', owner: 'Shi, Sunny', customer: 'Sandy', due: '2026-06-05', note: '' },
    { id: uid(), projectId: p1, title: 'Bed frame repair', status: 'todo', priority: 'high', owner: 'Sandy', customer: 'Shi, Sunny', due: '2026-06-05', note: '' },
  ];
  save();
}
function uid() { return Math.random().toString(36).slice(2,10); }

function render() {
  renderSidebar();
  if (state.currentProject === 'home') renderHome();
  else renderProject();
}
function renderSidebar() {
  const list = document.getElementById('project-list');
  list.innerHTML = state.projects.map(p => {
    const count = state.tasks.filter(t => t.projectId === p.id && t.status !== 'done').length;
    return `<div class="project-item ${state.currentProject === p.id ? 'active' : ''}" onclick="selectProject('${p.id}')">
      <span class="project-dot" style="background:${p.color}"></span>
      <span class="project-name">${p.name}</span>
      ${count > 0 ? `<span class="project-count">${count}</span>` : ''}
    </div>`;
  }).join('');
  document.querySelectorAll('.project-item').forEach(el => {
    const id = el.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
    if (id) el.classList.toggle('active', id === state.currentProject);
  });
}
function resetContentStyle() { const c = document.getElementById('main-content'); c.style.padding = '24px'; c.style.background = ''; }
function renderHome() {
  resetContentStyle();
  document.getElementById('page-title').textContent = '总览';
  document.getElementById('view-tabs').style.display = 'none';
  document.getElementById('add-task-btn').style.display = 'none';
  const all = state.tasks, done = all.filter(t => t.status === 'done').length, total = all.length;
  const progress = total ? Math.round(done/total*100) : 0;
  const today = new Date().toISOString().split('T')[0];
  const overdue = all.filter(t => t.due && t.due < today && t.status !== 'done').length;
  const inProgress = all.filter(t => t.status === 'progress').length;
  const upcoming = all.filter(t => t.status !== 'done' && t.due).sort((a,b) => a.due.localeCompare(b.due)).slice(0,6);
  document.getElementById('main-content').innerHTML = `
    <div class="stats-bar">
      <div class="stat-card"><div class="label">总体进度</div><div class="value">${progress}%</div><div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div><div class="sub">${done} / ${total} 任务完成</div></div>
      <div class="stat-card"><div class="label">进行中</div><div class="value" style="color:#fb8c00">${inProgress}</div><div class="sub">个任务</div></div>
      <div class="stat-card"><div class="label">已逾期</div><div class="value" style="color:#e53935">${overdue}</div><div class="sub">个任务</div></div>
      <div class="stat-card"><div class="label">项目数</div><div class="value">${state.projects.length}</div><div class="sub">个活跃项目</div></div>
    </div>
    <div class="home-grid">
      <div class="home-card"><h3>📅 即将到期</h3>${upcoming.length === 0 ? '<p style="color:var(--muted);font-size:13px;">暂无待处理任务</p>' : upcoming.map(t => {
        const proj = state.projects.find(p => p.id === t.projectId);
        return `<div class="upcoming-item"><span class="status-dot ${t.status==='progress'?'status-progress':'status-todo'}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.title}</span>${proj?`<span class="proj-tag" style="background:${proj.color}">${proj.name}</span>`:''}<span style="font-size:11px;color:${t.due<today?'var(--danger)':'var(--muted)'}">${t.due}</span></div>`;
      }).join('')}</div>
      <div class="home-card"><h3>📊 各项目进度</h3>${state.projects.map(p => {
        const pt = state.tasks.filter(t => t.projectId === p.id), pd = pt.filter(t => t.status==='done').length;
        const pct = pt.length ? Math.round(pd/pt.length*100) : 0;
        return `<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;"><span style="display:flex;align-items:center;gap:6px;"><span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block;"></span>${p.name}</span><span style="color:var(--muted)">${pd}/${pt.length}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${p.color}"></div></div></div>`;
      }).join('')}</div>
    </div>`;
}
function renderProject() {
  const proj = state.projects.find(p => p.id === state.currentProject);
  if (!proj) return;
  document.getElementById('page-title').textContent = proj.name;
  document.getElementById('view-tabs').style.display = 'flex';
  document.getElementById('add-task-btn').style.display = '';
  document.querySelectorAll('.view-tab').forEach((t, i) => t.classList.toggle('active', i === (state.currentView === 'list' ? 0 : 1)));
  if (state.currentView === 'kanban') renderKanban(proj);
  else renderList(proj);
}
function renderKanban(proj) {
  resetContentStyle();
  const tasks = state.tasks.filter(t => t.projectId === proj.id);
  const cols = [{id:'todo',label:'待处理',color:'#9e9e9e'},{id:'progress',label:'进行中',color:'#fb8c00'},{id:'done',label:'已完成',color:'#43a047'}];
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('main-content').innerHTML = `<div class="kanban">${cols.map(col => {
    const ct = tasks.filter(t => t.status === col.id);
    return `<div class="kanban-col"><div class="kanban-col-header"><span style="width:8px;height:8px;border-radius:50%;background:${col.color};display:inline-block;"></span><span class="kanban-col-title">${col.label}</span><span class="kanban-col-count">${ct.length}</span></div>
    <div class="drop-zone" id="dz-${col.id}" ondragover="dragOver(event,'${col.id}')" ondragleave="dragLeave(event)" ondrop="drop(event,'${col.id}')">${ct.map(t => taskCard(t,today)).join('')}</div>
    <button class="add-task-inline" onclick="openTaskModal('${col.id}')">🎁 更多惊喜</button></div>`;
  }).join('')}</div>`;
}
function taskCard(t, today) {
  const overdue = t.due && t.due < today && t.status !== 'done';
  const pl = {high:'High',med:'Med',low:'Low'}[t.priority]||'', pc = {high:'priority-high',med:'priority-med',low:'priority-low'}[t.priority]||'';
  return `<div class="task-card" draggable="true" id="tc-${t.id}" ondragstart="dragStart('${t.id}')" ondragend="dragEnd()">
    <div class="task-title">${t.title}</div>
    <div class="task-meta"><span class="tag ${pc}">${pl}</span>${t.owner?`<span class="assignee">👤 ${t.owner}</span>`:''}${t.customer?`<span class="assignee" style="color:#5c6bc0">🎯 ${t.customer}</span>`:''}${t.due?`<span class="due-date ${overdue?'overdue':''}">📅 ${t.due}</span>`:''}
    <div class="task-actions"><button class="icon-btn" onclick="openTaskModal(null,'${t.id}')">✏️</button><button class="icon-btn" onclick="deleteTask('${t.id}')">🗑️</button></div></div></div>`;
}
function avatarColor(name) {
  const colors = ['#5c6bc0','#26a69a','#ef5350','#ab47bc','#ff7043','#66bb6a','#29b6f6','#ffa726'];
  let h = 0; for (const c of (name||'?')) h = c.charCodeAt(0) + ((h<<5)-h);
  return colors[Math.abs(h) % colors.length];
}
function avatarHtml(name) {
  if (!name) return '<span style="color:#ccc;font-size:12px;">—</span>';
  return name.split(/[,、]/).map(n=>n.trim()).filter(Boolean).slice(0,2).map(n=>`<div class="avatar" style="background:${avatarColor(n)}" title="${n}">${n.slice(0,2).toUpperCase()}</div>`).join('');
}
function renderList(proj) {
  const tasks = state.tasks.filter(t => t.projectId === proj.id);
  const today = new Date().toISOString().split('T')[0];
  const pl = {high:'High',med:'Med',low:'Low'}, pc = {high:'priority-high',med:'priority-med',low:'priority-low'};
  const sections = [{id:'todo',label:'待处理',color:'#9e9e9e'},{id:'progress',label:'进行中',color:'#fb8c00'},{id:'done',label:'已完成',color:'#43a047'}];
  const colHeader = `<div class="asana-col-header"><div class="col-task">Task name</div><div class="col-field">Assignee</div><div class="col-field">Customer</div><div class="col-field">Due date</div><div class="col-field">Priority</div></div>`;
  const sectionsHtml = sections.map(sec => {
    const st = tasks.filter(t => t.status === sec.id), isDone = sec.id === 'done';
    const rows = st.map(t => {
      const overdue = t.due && t.due < today && !isDone;
      const cc = t.status==='done'?'checked':t.status==='progress'?'in-progress':'';
      return `<div class="asana-row"><div class="row-check"><div class="task-check ${cc}" onclick="cycleStatus('${t.id}')"></div></div>
        <div class="row-title"><span class="title-text ${isDone?'done-text':''}" onclick="openTaskModal(null,'${t.id}')">${t.title}</span><div class="row-actions"><button class="icon-btn" onclick="openTaskModal(null,'${t.id}')">✏️</button><button class="icon-btn" onclick="deleteTask('${t.id}')">🗑️</button></div></div>
        <div class="row-field"><div style="display:flex;gap:3px;">${avatarHtml(t.owner)}</div></div>
        <div class="row-field"><div style="display:flex;gap:3px;">${avatarHtml(t.customer)}</div></div>
        <div class="row-field ${overdue?'':'muted'}" style="${overdue?'color:#e53935':''}">${t.due||'—'}</div>
        <div class="row-field">${t.priority?`<span class="tag ${pc[t.priority]}">${pl[t.priority]}</span>`:'<span style="color:#ccc">—</span>'}</div>
      </div>`;
    }).join('');
    return `<div class="asana-section"><div class="asana-section-header" onclick="toggleSection(this)"><span class="section-arrow">▼</span><span class="section-color" style="background:${sec.color}"></span><span class="section-name">${sec.label}</span><span class="section-badge">${st.length}</span></div>
      <div class="section-body">${rows}<button class="add-row-btn" onclick="openTaskModal('${sec.id}')">＋ 🎁 更多惊喜</button></div></div>`;
  }).join('');
  const content = document.getElementById('main-content');
  content.style.padding = '0'; content.style.background = '#fff';
  content.innerHTML = `<div class="asana-wrap">${colHeader}${sectionsHtml}</div>`;
}
function selectProject(id) { state.currentProject = id; render(); }
function switchView(v) { state.currentView = v; render(); }
function openProjectModal() {
  document.getElementById('proj-name').value = '';
  state.selectedColor = '#5c6bc0';
  document.querySelectorAll('#color-picker div').forEach(d => d.style.border = d.style.background==='rgb(92, 107, 192)'?'2px solid #5c6bc0':'2px solid transparent');
  document.getElementById('project-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('proj-name').focus(), 50);
}
function selectColor(el, color) { state.selectedColor = color; document.querySelectorAll('#color-picker div').forEach(d => d.style.border='2px solid transparent'); el.style.border=`2px solid ${color}`; }
function createProject() {
  const name = document.getElementById('proj-name').value.trim(); if (!name) return;
  const proj = { id: uid(), name, color: state.selectedColor };
  state.projects.push(proj); state.currentProject = proj.id; state.currentView = 'list';
  save(); closeModal('project-modal'); render();
}
function openTaskModal(status, taskId) {
  state.editingTaskId = taskId || null;
  document.getElementById('task-modal-title').textContent = taskId ? '编辑任务' : '新建任务';
  if (taskId) {
    const t = state.tasks.find(t => t.id === taskId); if (!t) return;
    document.getElementById('task-title').value = t.title;
    document.getElementById('task-status').value = t.status;
    document.getElementById('task-priority').value = t.priority;
    document.getElementById('task-owner').value = t.owner || '';
    document.getElementById('task-customer').value = t.customer || '';
    document.getElementById('task-due').value = t.due || '';
    document.getElementById('task-note').value = t.note || '';
  } else {
    document.getElementById('task-title').value = '';
    document.getElementById('task-status').value = status || 'todo';
    document.getElementById('task-priority').value = 'med';
    document.getElementById('task-owner').value = '';
    document.getElementById('task-customer').value = '';
    document.getElementById('task-due').value = '';
    document.getElementById('task-note').value = '';
  }
  document.getElementById('task-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('task-title').focus(), 50);
}
function saveTask() {
  const title = document.getElementById('task-title').value.trim();
  if (!title) { document.getElementById('task-title').style.borderColor='var(--danger)'; return; }
  document.getElementById('task-title').style.borderColor = '';
  const data = { title, status: document.getElementById('task-status').value, priority: document.getElementById('task-priority').value, owner: document.getElementById('task-owner').value.trim(), customer: document.getElementById('task-customer').value.trim(), due: document.getElementById('task-due').value, note: document.getElementById('task-note').value.trim() };
  if (state.editingTaskId) { const idx = state.tasks.findIndex(t => t.id === state.editingTaskId); if (idx >= 0) state.tasks[idx] = { ...state.tasks[idx], ...data }; }
  else state.tasks.push({ id: uid(), projectId: state.currentProject, ...data });
  save(); closeModal('task-modal'); render();
}
function toggleSection(el) { const arrow = el.querySelector('.section-arrow'), body = el.nextElementSibling, c = arrow.classList.toggle('collapsed'); body.style.display = c ? 'none' : ''; }
function cycleStatus(id) { const t = state.tasks.find(t => t.id === id); if (!t) return; t.status = {todo:'progress',progress:'done',done:'todo'}[t.status]; save(); render(); }
function deleteTask(id) { if (!confirm('确定删除这个任务吗？')) return; state.tasks = state.tasks.filter(t => t.id !== id); save(); render(); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
function dragStart(id) { state.dragTaskId = id; setTimeout(() => document.getElementById('tc-'+id)?.classList.add('dragging'), 0); }
function dragEnd() { document.querySelectorAll('.task-card').forEach(el => el.classList.remove('dragging')); document.querySelectorAll('.drop-zone').forEach(el => el.classList.remove('drag-over')); state.dragTaskId = null; }
function dragOver(e, id) { e.preventDefault(); document.querySelectorAll('.drop-zone').forEach(el => el.classList.remove('drag-over')); document.getElementById('dz-'+id)?.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function drop(e, id) { e.preventDefault(); if (state.dragTaskId) { const t = state.tasks.find(t => t.id === state.dragTaskId); if (t) { t.status = id; save(); } } render(); }
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay:not(.hidden)').forEach(m => m.classList.add('hidden'));
  if (e.key === 'Enter' && e.metaKey) { if (!document.getElementById('task-modal').classList.contains('hidden')) saveTask(); if (!document.getElementById('project-modal').classList.contains('hidden')) createProject(); }
});
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) o.classList.add('hidden'); }));

(async () => {
  load();
  state.currentView = 'list';
  if (state.projects.length === 0) initSample();
  if (state.projects.length > 0) state.currentProject = state.projects[0].id;
  render();
  if (binId) {
    const data = await cloudLoad(binId);
    if (data) { state.projects = data.projects || state.projects; state.tasks = data.tasks || state.tasks; render(); setSyncStatus('✓ 已同步'); }
  } else {
    await cloudSave();
  }
})();
</script>
</body>
</html>
